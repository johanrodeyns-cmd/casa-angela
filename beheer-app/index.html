<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Angela — Beheer</title>
<style>
  :root {
    --terracotta: #C4654A;
    --terracotta-light: #E8A790;
    --olive: #7A8B5C;
    --olive-dark: #5A6B3C;
    --azure: #4A90A4;
    --azure-light: #A8D4E6;
    --sand: #F5EBE0;
    --sand-dark: #E6D5C3;
    --cream: #FFFBF5;
    --charcoal: #2C2C2C;
  }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--charcoal);
    font-family: system-ui, sans-serif;
  }
  header {
    background: var(--terracotta);
    color: var(--cream);
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 {
    margin: 0;
    font-size: 1.25rem;
  }
  #version {
    font-size: 0.85rem;
    opacity: 0.85;
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    padding: 0.25rem;
    min-height: 44px;
    min-width: 44px;
  }
  #version:hover {
    text-decoration: underline;
  }
  dialog#changelog-dialog {
    border: none;
    border-radius: 8px;
    padding: 1.5rem;
    max-width: 480px;
    width: 90%;
    color: var(--charcoal);
  }
  dialog#changelog-dialog::backdrop {
    background: rgba(44, 44, 44, 0.5);
  }
  dialog#changelog-dialog h2 {
    margin-top: 0;
    color: var(--terracotta);
  }
  .changelog-entry {
    text-align: left;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--sand-dark);
  }
  .changelog-entry:last-child {
    border-bottom: none;
  }
  .changelog-entry .changelog-meta {
    font-weight: bold;
    color: var(--olive-dark);
  }
  .screen {
    display: none;
    max-width: 480px;
    margin: 3rem auto;
    padding: 0 1rem;
    text-align: center;
  }
  .screen.active {
    display: block;
  }
  button {
    font-size: 1rem;
    padding: 0.75rem 1.5rem;
    min-height: 44px;
    border: none;
    border-radius: 6px;
    background: var(--terracotta);
    color: var(--cream);
    cursor: pointer;
  }
  button:hover {
    background: var(--terracotta-light);
  }
  #denied-screen h2 {
    color: var(--terracotta);
  }
  #user-email {
    font-size: 0.85rem;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <header>
    <h1>Casa Angela — Beheer</h1>
    <button id="version" type="button"></button>
  </header>

  <dialog id="changelog-dialog">
    <h2>Changelog</h2>
    <div id="changelog-list"></div>
    <button id="changelog-close" type="button">Sluiten</button>
  </dialog>

  <section id="login-screen" class="screen">
    <p>Meld je aan om verder te gaan.</p>
    <button id="login-button" type="button">Inloggen met Google</button>
  </section>

  <section id="denied-screen" class="screen">
    <h2>Geen toegang</h2>
    <p>Dit account heeft geen toegang tot de Casa Angela beheer-app.</p>
    <button id="logout-button" type="button">Opnieuw inloggen</button>
  </section>

  <section id="app-screen" class="screen">
    <p>Ingelogd als <span id="user-email"></span></p>
    <button id="signout-button" type="button">Uitloggen</button>
  </section>

  <script src="logic.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAG08ALUt-fObgOoraUJRsZXrV98JbYnpw",
      authDomain: "casa-angela-jr.firebaseapp.com",
      projectId: "casa-angela-jr",
      storageBucket: "casa-angela-jr.firebasestorage.app",
      messagingSenderId: "307484035181",
      appId: "1:307484035181:web:10a806b9278b89222d5764",
    };

    const ALLOWED_EMAILS = ["johan.rodeyns@gmail.com", "tinbogaerts@gmail.com"];

    const CHANGELOG = [
      { version: "0.3.0", date: "2026-07-17", description: "Versienummer en changelog zichtbaar in de UI." },
      { version: "0.2.0", date: "2026-07-17", description: "Google-login met toegangscontrole voor Johan en Tinneke." },
      { version: "0.1.0", date: "2026-07-17", description: "Initiële versie." },
    ];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    getFirestore(app);

    document.getElementById("version").textContent = "v" + getVersion();

    const changelogDialog = document.getElementById("changelog-dialog");
    const changelogList = document.getElementById("changelog-list");
    changelogList.innerHTML = CHANGELOG.map(
      (entry) => `
        <div class="changelog-entry">
          <div class="changelog-meta">v${entry.version} — ${entry.date}</div>
          <div>${entry.description}</div>
        </div>
      `
    ).join("");

    document.getElementById("version").addEventListener("click", () => changelogDialog.showModal());
    document.getElementById("changelog-close").addEventListener("click", () => changelogDialog.close());

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach((el) => {
        el.classList.toggle("active", el.id === id);
      });
    }

    // signOut() after a denied login re-fires onAuthStateChanged(null); this flag
    // stops that from bouncing the user back to the login screen automatically.
    let denied = false;

    document.getElementById("login-button").addEventListener("click", () => {
      denied = false;
      signInWithPopup(auth, new GoogleAuthProvider());
    });
    document.getElementById("logout-button").addEventListener("click", () => {
      denied = false;
      showScreen("login-screen");
      signOut(auth);
    });
    document.getElementById("signout-button").addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        if (!denied) showScreen("login-screen");
        return;
      }
      if (!isAllowedEmail(user.email, ALLOWED_EMAILS)) {
        denied = true;
        signOut(auth);
        showScreen("denied-screen");
        return;
      }
      document.getElementById("user-email").textContent = user.email;
      showScreen("app-screen");
    });
  </script>
</body>
</html>
